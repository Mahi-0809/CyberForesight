# Default config (safe to commit). Override secrets in config.local.yaml (see .gitignore).
project:
  seed: 42
  start_date: "2011-07-01"
  end_date: "2022-12-01"
  forecast_start: "2023-01-01"
  forecast_end: "2025-12-01"
  data_dir: "data"
  output_dir: "outputs"

api:
  elsevier_key: ""
  twitter_bearer: ""
  openai_key: ""
  nvd_api_key: ""
  acled_email: ""
  acled_password: ""
  # Live connectors: when true, collectors attempt real API calls
  # before falling back to synthetic data.
  use_live_apis: true

# Per-API settings
apis:
  elsevier:
    enabled: true
    rate_limit_sleep: 0.2   # seconds between requests (5 req/sec free tier)

  semantic_scholar:
    enabled: true            # backup for elsevier
    rate_limit_sleep: 3.0    # seconds between requests (100 req/5 min)



  acled:
    enabled: true
    email: ""                # user fills this in config.local.yaml

  nvd:
    enabled: true
    rate_limit_sleep: 0.6    # seconds between requests (50 req/30 sec)

  hackmageddon:
    enabled: true            # bonus scraper — fragile

# Caching layer
cache:
  enabled: true
  refresh: false             # set true to re-download everything
  path: "data/raw/"

model:
  tin: 10
  tout: 36
  dropout: 0.4
  lr: 0.001
  epochs: 80
  graph_k: 12
  gcn_depth: 2
  conv_channels: 16
  alpha: 1.5
  beta: 0.2
  mc_iterations: 30

search:
  random_iterations: 20
  lr_range: [0.0001, 0.01]
  dropout_range: [0.2, 0.7]
  conv_channels: [8, 12, 16]
  gcn_depth: [1, 2, 3]
